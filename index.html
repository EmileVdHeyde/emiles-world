<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emile's World</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    color: #f0ede8;
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  h1 {
    font-size: clamp(3rem, 8vw, 6rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    margin-bottom: 3rem;
    text-align: center;
  }

  h1 span { color: #8B5CF6; }

  .links {
    display: flex;
    flex-direction: column;
    gap: 1px;
    width: min(520px, 90vw);
  }

  .link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5rem 2rem;
    background: #111;
    border: 1px solid #222;
    text-decoration: none;
    color: #f0ede8;
    transition: background 0.15s, border-color 0.15s;
  }

  .link:hover {
    background: #1a1a1a;
    border-color: #8B5CF6;
  }

  .link:hover .arrow { color: #8B5CF6; }

  .link-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
  }

  .arrow {
    font-size: 1.2rem;
    color: #333;
    transition: color 0.15s, transform 0.15s;
  }

  .link:hover .arrow { transform: translate(3px, -3px); }

  footer {
    margin-top: 3rem;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: #444;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>

<h1>Emile's <span>World</span></h1>

<div class="links">
  <a class="link" href="karaoke-spinner.html">
    <span class="link-label">🎤 &nbsp; karaoke-spinner</span>
    <span class="arrow">↗</span>
  </a>
  <a class="link" href="padel-checklist-western-cape.html">
    <span class="link-label">🎾 &nbsp; padel-checklist-western-cape</span>
    <span class="arrow">↗</span>
  </a>
</div>

<footer>Cape Town · 2026</footer>

</body>
</html>
