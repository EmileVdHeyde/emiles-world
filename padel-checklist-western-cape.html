<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Western Cape Padel Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c1410; --bg2: #111c16; --bg3: #162019; --border: #1e3026;
    --green: #4a9a5e; --green-light: #6dba82; --green-dim: #2d5a3a;
    --text: #ddd8cc; --text-dim: #7a8a7a; --text-muted: #3a4e3a;
    --indoor: #4FC3F7; --outdoor: #81C784; --both: #FFB74D; --gold: #c8a84a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; padding-bottom: 60px; }

  header { background: linear-gradient(160deg,#132419 0%,#0c1a12 60%,#0a1510 100%); border-bottom: 1px solid var(--green-dim); padding: 40px 20px 32px; text-align: center; position: relative; overflow: hidden; }
  header::before { content:''; position:absolute; inset:0; background: radial-gradient(ellipse 60% 60% at 15% 50%,rgba(74,154,94,.07) 0%,transparent 70%), radial-gradient(ellipse 40% 40% at 85% 20%,rgba(74,154,94,.05) 0%,transparent 60%); pointer-events:none; }
  .eyebrow { font-size:11px; letter-spacing:.35em; text-transform:uppercase; color:var(--green); margin-bottom:10px; position:relative; }
  header h1 { font-family:'Playfair Display',serif; font-size:clamp(26px,5vw,44px); font-weight:400; color:#f0ead8; letter-spacing:.03em; margin-bottom:6px; position:relative; }
  header p { font-style:italic; color:var(--green); font-size:14px; margin-bottom:28px; font-family:'Playfair Display',serif; position:relative; }
  .progress-wrap { max-width:420px; margin:0 auto; position:relative; z-index:1; }
  .prog-labels { display:flex; justify-content:space-between; font-size:13px; margin-bottom:8px; color:var(--text-dim); }
  .prog-pct { color:var(--green-light); font-size:18px; font-weight:500; }
  .prog-bg { background:#1a2e20; border-radius:99px; height:8px; overflow:hidden; }
  .prog-fill { height:100%; background:linear-gradient(90deg,var(--green-dim),var(--green-light)); border-radius:99px; transition:width .4s ease; width:0%; }
  .champ { margin-top:10px; color:var(--gold); font-size:14px; display:none; }

  .controls { background:#0e1812; border-bottom:1px solid var(--border); padding:14px 16px; position:sticky; top:0; z-index:20; }
  .search { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:10px 14px; font-size:14px; font-family:'DM Sans',sans-serif; outline:none; transition:border-color .2s; margin-bottom:10px; }
  .search:focus { border-color:var(--green-dim); }
  .search::placeholder { color:var(--text-muted); }
  .frow { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
  .fbtn { padding:4px 13px; border-radius:99px; border:1px solid var(--border); background:transparent; color:var(--text-dim); cursor:pointer; font-size:12px; font-family:'DM Sans',sans-serif; transition:all .18s; white-space:nowrap; }
  .fbtn:hover { border-color:var(--green-dim); color:var(--green); }
  .fbtn.aAll,.fbtn.aregion { border-color:var(--green); background:rgba(74,154,94,.12); color:var(--green-light); }
  .fbtn.aIndoor  { border-color:var(--indoor);  background:rgba(79,195,247,.1);  color:var(--indoor);  }
  .fbtn.aOutdoor { border-color:var(--outdoor); background:rgba(129,199,132,.1); color:var(--outdoor); }
  .fbtn.aBoth    { border-color:var(--both);    background:rgba(255,183,77,.1);  color:var(--both);    }

  .rcount { padding:10px 18px 2px; font-size:12px; color:var(--text-muted); letter-spacing:.05em; }

  .rgroup { padding:0 14px; margin-bottom:24px; }
  .rheader { display:flex; justify-content:space-between; align-items:center; padding:10px 2px 8px; border-bottom:1px solid var(--border); margin-bottom:10px; }
  .rtitle { font-size:11px; letter-spacing:.25em; text-transform:uppercase; color:var(--green); font-weight:500; }
  .rcount2 { font-size:11px; color:var(--text-muted); }

  .card { display:flex; align-items:center; gap:13px; padding:13px 14px; background:var(--bg2); border:1px solid var(--border); border-radius:10px; cursor:pointer; transition:all .18s; margin-bottom:7px; user-select:none; -webkit-tap-highlight-color:transparent; animation:fadeIn .2s ease both; }
  .card:hover { border-color:var(--green-dim); background:#141e18; }
  .card.v { background:#0d1e14; border-color:#2a5038; }
  .chkbox { width:22px; height:22px; border-radius:6px; border:2px solid var(--border); background:transparent; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .18s; font-size:13px; color:#fff; }
  .card.v .chkbox { background:var(--green-dim); border-color:var(--green); }
  .cinfo { flex:1; min-width:0; }
  .cname { font-size:14px; color:#c8c0b0; margin-bottom:3px; font-family:'Playfair Display',serif; font-weight:400; line-height:1.3; transition:color .18s; }
  .card.v .cname { text-decoration:line-through; text-decoration-color:#3a6a4a; color:#5a8a6a; }
  .carea { font-size:11px; color:var(--text-muted); }
  .cbadges { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
  .tbadge { font-size:10px; padding:2px 8px; border-radius:99px; border:1px solid; white-space:nowrap; }
  .tIndoor  { color:var(--indoor);  border-color:rgba(79,195,247,.3);  background:rgba(79,195,247,.08);  }
  .tOutdoor { color:var(--outdoor); border-color:rgba(129,199,132,.3); background:rgba(129,199,132,.08); }
  .tBoth    { color:var(--both);    border-color:rgba(255,183,77,.3);  background:rgba(255,183,77,.08);  }
  .clabel { font-size:10px; color:var(--text-muted); }

  footer { text-align:center; padding:30px 20px 0; font-size:11px; color:var(--text-muted); border-top:1px solid var(--border); margin-top:16px; letter-spacing:.05em; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Western Cape · South Africa</div>
  <h1>🎾 Padel Club Checklist</h1>
  <p>Track every court across the Cape</p>
  <div class="progress-wrap">
    <div class="prog-labels"><span id="vlabel">0 of 0 visited</span><span class="prog-pct" id="pct">0%</span></div>
    <div class="prog-bg"><div class="prog-fill" id="fill"></div></div>
    <div class="champ" id="champ">🏆 Padel Champion of the Western Cape!</div>
  </div>
</header>

<div class="controls">
  <input class="search" type="text" id="srch" placeholder="Search clubs or areas…">
  <div class="frow" id="tfilters">
    <button class="fbtn aAll" data-t="All">All Types</button>
    <button class="fbtn" data-t="Indoor">🏠 Indoor</button>
    <button class="fbtn" data-t="Outdoor">☀️ Outdoor</button>
    <button class="fbtn" data-t="Both">🔄 Both</button>
  </div>
  <div class="frow" id="rfilters"></div>
</div>

<div class="rcount" id="rc"></div>
<div id="list"></div>
<footer>Tap any club to mark as visited · Progress auto-saves in your browser · Updated April 2026</footer>

<script>

  {id:36,name:"GameOn Sports",                       area:"Turfhall Estate, Kenilworth",              region:"Southern Suburbs",     courts:null, type:"Outdoor"},
  {id:37,name:"Bay Padel",                           area:"South Palms Centre, Retreat / Tokai",      region:"Southern Suburbs",     courts:6,    type:"Indoor"},
  {id:38,name:"Enigma Padel",                        area:"Brigid Road, Elfindale, Diep River",       region:"Southern Suburbs",     courts:null, type:"Outdoor"},

  {id:46,name:"Club Padel Stellenbosch",             area:"Stellenbosch",                             region:"Stellenbosch",         courts:5,    type:"Both"},

  // FRANSCHHOEK & SURROUNDS
  {id:54,name:"Rickety Bridge Padel & Social Club",  area:"Rickety Bridge Wine Estate, Franschhoek",  region:"Franschhoek",          courts:null, type:"Outdoor"},
  {id:55,name:"Fransvliet Estate Padel",             area:"Fransvliet Estate, Franschhoek",           region:"Franschhoek",          courts:1,    type:"Outdoor"},
  {id:56,name:"Inwine Padel",                        area:"Klapmuts (near Franschhoek)",              region:"Franschhoek",          courts:null, type:"Outdoor"},
  // PAARL & WELLINGTON
  {id:57,name:"Val de Vie Estate Padel",             area:"Val de Vie, Paarl",                        region:"Paarl & Wellington",   courts:null, type:"Outdoor"},

  // SOMERSET WEST

  // WEST COAST
  {id:63,name:"Langebaan Country Estate Padel",      area:"Langebaan Country Estate",                 region:"West Coast",           courts:2,    type:"Outdoor"},

  // GREATER WESTERN CAPE

  {id:77,name:"Point Padel Mossel Bay",              area:"Mossel Bay",                               region:"Greater Western Cape", courts:2,    type:"Outdoor"},

const REGIONS=["All","Cape Town City","Atlantic Seaboard","Inner City Fringe","Northern Suburbs","Southern Suburbs","Deep South","Stellenbosch","Franschhoek","Paarl & Wellington","Somerset West","West Coast","Greater Western Cape"];
const ICON={Indoor:"🏠",Outdoor:"☀️",Both:"🔄"};

let visited={};
try{visited=JSON.parse(localStorage.getItem('padelV3')||'{}');}catch(e){}
let aR="All",aT="All";

// Region buttons
const rf=document.getElementById('rfilters');
REGIONS.forEach(r=>{
  const b=document.createElement('button');
  b.className='fbtn'+(r==='All'?' aregion':'');
  b.textContent=r; b.dataset.r=r;
  b.onclick=()=>{ aR=r; rf.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('aregion')); b.classList.add('aregion'); render(); };
  rf.appendChild(b);
});

// Type buttons
document.getElementById('tfilters').onclick=e=>{
  const b=e.target.closest('[data-t]'); if(!b) return;
  aT=b.dataset.t;
  document.querySelectorAll('#tfilters .fbtn').forEach(x=>x.className='fbtn');
  b.classList.add('a'+aT);
  render();
};

document.getElementById('srch').oninput=render;

function render(){
  const s=document.getElementById('srch').value.toLowerCase();
  const filt=clubs.filter(c=>{
    const rOk=aR==='All'||c.region===aR;
    const tOk=aT==='All'||c.type===aT||(aT!=='Both'&&c.type==='Both');
    const sOk=!s||c.name.toLowerCase().includes(s)||c.area.toLowerCase().includes(s)||c.region.toLowerCase().includes(s);
    return rOk&&tOk&&sOk;
  });
  document.getElementById('rc').textContent=`Showing ${filt.length} of ${clubs.length} clubs`;
  const container=document.getElementById('list');
  container.innerHTML='';
  const grouped={};
  filt.forEach(c=>{if(!grouped[c.region])grouped[c.region]=[];grouped[c.region].push(c);});
  Object.entries(grouped).forEach(([reg,list])=>{
    const rv=list.filter(c=>visited[c.id]).length;
    const g=document.createElement('div'); g.className='rgroup';
    g.innerHTML=`<div class="rheader"><span class="rtitle">${reg}</span><span class="rcount2">${rv}/${list.length}</span></div>`;
    list.forEach((c,i)=>{
      const v=!!visited[c.id];
      const d=document.createElement('div');
      d.className='card'+(v?' v':'');
      d.style.animationDelay=(i*.025)+'s';
      d.innerHTML=`<div class="chkbox">${v?'✓':''}</div><div class="cinfo"><div class="cname">${c.name}</div><div class="carea">📍 ${c.area}</div></div><div class="cbadges"><span class="tbadge t${c.type}">${ICON[c.type]} ${c.type}</span>${c.courts?`<span class="clabel">${c.courts} court${c.courts>1?'s':''}</span>`:''}</div>`;
      d.onclick=()=>{visited[c.id]=!visited[c.id];try{localStorage.setItem('padelV3',JSON.stringify(visited));}catch(e){}render();};
      g.appendChild(d);
    });
    container.appendChild(g);
  });
  updateProg();
}

function updateProg(){
  const total=clubs.length, count=Object.values(visited).filter(Boolean).length, pct=Math.round(count/total*100);
  document.getElementById('vlabel').textContent=`${count} of ${total} clubs visited`;
  document.getElementById('pct').textContent=pct+'%';
  document.getElementById('fill').style.width=pct+'%';
  document.getElementById('champ').style.display=count===total?'block':'none';
}

render();
</script>
</body>
</html>
